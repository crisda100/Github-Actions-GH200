name: github-init

on: push

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v2
            
            - name: List ls
              run: ls -l ; pwd

            - name: Validate python
              run: python3 --version
            
            - name: Change permissions python script
              run: chmod +x init.py ; ls -l
            
            - name: run python
              run: python3 init.py
            
            - run: sudo apt update -y
            - run: sudo apt install cowsay -y
            - name: Execute cowsay
              run: cowsay -f dragon "Run for over,I am a DRAGON ........RARRR .." >> dragon.txt

            - name: upload file  
              uses: actions/upload-artifact@v7
              with:
                name: dragon-test
                path: dragon.txt

            - name: docker passwd
              run: echo "My password is  very safe" ${{ secrets.DOCKER_PASSWORD }}  
            - name: docker passwd
              run: echo "My docker repo " ${{ vars.DOCKER_REPO }}  
              
    job-2:
      needs: [job-1]
      runs-on: ubuntu-latest  
      steps:
          - name: download file  
            uses: actions/download-artifact@v8
            with:
                name: dragon-test
              
          - run: cat dragon.txt
    