name: github-init

on: push

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout repo
              uses: actions/checkout@v2

            - name: Validate python
              run: python3 --version
            
            - name: Change permissions python script
              run: chmod +x init.py ; ls -l
            
            - name: run python
              run: python3 init.py

            - name: Init S.O
              run: cat /etc/os-release

            - name: User S.O
              run: whoami ; id
            
            - name: Validate files
              run: touch file{1..20}.txt
            
