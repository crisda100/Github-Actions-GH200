name: Workflows-commands

on:
  push: 
    branches: 
       - master
            
jobs:
    workflows-command:
        runs-on: ubuntu-latest
        steps:
          - name: "Group logging"
            run: |
                echo "::group:: My group"
                echo "Message 1"
                echo "Message 2"
                echo "::endgroup::"
          - name: "Step 1"
            run: |
                echo "MY_VAR=crisda" >> $GITHUB_ENV
                echo "$GITHUB_ENV"
          - name: "Step 2"
            run: echo $MY_VAL
              